services:
  backend:
    build:
      context: ./backend
    container_name: momentum-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    profiles:
      - full-stack
    build:
      context: ./frontend
    container_name: momentum-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
